{% extends 'base1.html' %}
{% block title %}Verify Reset OTP{% endblock title %}

{% block ex_css %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --cyan: #00f5ff; --dark: #03060d; --panel: rgba(6,18,40,0.85); --border: rgba(0,245,255,0.25); --text: #c8e8f0; }
  body { background: var(--dark); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { width: 100%; max-width: 420px; padding: 40px 32px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  h1 { font-family: 'Orbitron', monospace; font-size: 22px; text-align: center; margin-bottom: 10px; color: #fff; }
  p { text-align: center; margin-bottom: 24px; opacity: .85; }
  .form-label { display: block; margin-bottom: 8px; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--cyan); }
  .form-input { width: 100%; padding: 13px 14px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,245,255,0.05); color: #fff; outline: none; }
  .btn { width: 100%; margin-top: 18px; padding: 14px; border: 1px solid var(--cyan); border-radius: 6px; background: transparent; color: var(--cyan); font-family: 'Orbitron', monospace; cursor: pointer; }
  .msg { padding: 12px 14px; border-radius: 6px; margin-bottom: 18px; font-size: 14px; background: rgba(255,50,80,0.1); border: 1px solid rgba(255,50,80,0.35); color: #ff6070; }
</style>
{% endblock ex_css %}

{% block content %}
<div class="wrap">
  <div class="card">
    <h1>Verify OTP</h1>
    <p>Enter the OTP sent to your email.</p>

    {% if error %}<div class="msg">{{ error }}</div>{% endif %}

    <form method="POST">
      {% csrf_token %}
      <label class="form-label" for="otp">OTP Code</label>
      <input class="form-input" type="text" id="otp" name="otp" maxlength="6" placeholder="6-digit OTP" required>
      <button class="btn" type="submit">Verify OTP</button>
    </form>
  </div>
</div>
{% endblock content %}
