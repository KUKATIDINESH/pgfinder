{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PGKamra{% endblock %} — Bengaluru Rooms</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --ink: #0a0a0f;
      --paper: #f5f3ef;
      --accent: #ff4e1a;
      --accent2: #7c3aed;
      --muted: #6b6b7b;
      --border: #e2dfd8;
      --card-bg: #ffffff;
      --nav-h: 72px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── NOISE GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    main { flex: 1; }

    /* ── NAV ── */
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      height: var(--nav-h);
      background: var(--ink);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 1.5rem;
      border-bottom: 2px solid var(--accent);
    }

    .site-nav .brand {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
    }

    .site-nav .brand img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
    }

    .site-nav .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      color: #fff;
      letter-spacing: -.02em;
    }

    .site-nav .brand-name span { color: var(--accent); }

    .site-nav .city-tag {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid #2a2a3a;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .site-nav .nav-links {
      display: flex;
      align-items: center;
      gap: .25rem;
      list-style: none;
      margin-left: auto;
    }

    .site-nav .nav-links a {
      font-size: .85rem;
      font-weight: 500;
      color: #b0b0c3;
      text-decoration: none;
      padding: .45rem .85rem;
      border-radius: 6px;
      transition: all .2s;
      white-space: nowrap;
    }

    .site-nav .nav-links a:hover {
      background: rgba(255,78,26,.12);
      color: var(--accent);
    }

    .site-nav .nav-links .nav-cta a {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .site-nav .nav-links .nav-cta a:hover {
      background: #e0381a;
      color: #fff;
    }

    /* hamburger */
    .nav-toggle {
      display: none;
      background: none;
      border: 1px solid #2a2a3a;
      color: #fff;
      width: 38px; height: 38px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: auto;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    @media (max-width: 820px) {
      .nav-toggle { display: flex; }
      .site-nav .nav-links {
        display: none;
        position: absolute;
        top: var(--nav-h);
        left: 0; right: 0;
        background: var(--ink);
        flex-direction: column;
        padding: 1rem;
        border-bottom: 2px solid var(--accent);
        gap: .1rem;
      }
      .site-nav .nav-links.open { display: flex; }
      .site-nav .nav-links a { padding: .65rem 1rem; border-radius: 8px; }
      .site-nav { position: relative; }
    }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--ink);
      color: #6b6b7b;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: .8rem;
      border-top: 2px solid var(--accent);
    }

    .site-footer strong { color: var(--accent); }

    /* ── UTILITY ── */
    .btn-pill {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: .9rem;
      cursor: pointer;
      transition: all .2s;
      border: none;
      text-decoration: none;
    }

    .btn-pill.primary { background: var(--accent); color: #fff; }
    .btn-pill.primary:hover { background: #e0381a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,78,26,.35); color: #fff; }

    .btn-pill.ghost { background: transparent; color: var(--ink); border: 2px solid var(--border); }
    .btn-pill.ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* page title bar */
    .page-hero {
      background: var(--ink);
      color: #fff;
      padding: 3.5rem 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .page-hero::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 60px;
      background: var(--paper);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .page-hero h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -.04em;
    }

    .page-hero h1 em { color: var(--accent); font-style: normal; }

    .page-hero p { color: #9090a8; font-size: 1.05rem; margin-top: .5rem; }
  </style>
  {% block extra_css %}{% endblock extra_css %}
</head>
<body>

  {% include 'nav.html' %}

  <main>{% block content %}{% endblock content %}</main>

  <footer class="site-footer">
    <p>&copy; 2025 <strong>PGKamra</strong> · Bangalore's sharpest room finder.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // nav toggle
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.querySelector('.nav-toggle');
      const links  = document.querySelector('.site-nav .nav-links');
      if (toggle && links) {
        toggle.addEventListener('click', () => links.classList.toggle('open'));
      }
    });
  </script>
  {% block extra_js %}{% endblock extra_js %}
</body>
</html>
